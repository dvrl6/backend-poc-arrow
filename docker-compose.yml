services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrow-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/arrow_poc?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: arrow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arrow_poc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arrow_poc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
